name: rmcs-navigation CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "CMakeLists.txt"
      - "package.xml"
      - "cmake/**"
      - "config/**"
      - "launch/**"
      - "maps/**"
      - "plugins.xml"
      - "src/**"
      - "test/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "CMakeLists.txt"
      - "package.xml"
      - "cmake/**"
      - "config/**"
      - "launch/**"
      - "maps/**"
      - "plugins.xml"
      - "src/**"
      - "test/**"

env:
  RMCS_REPO: https://github.com/Alliance-Algorithm/RMCS.git
  RMCS_REF: main

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: qzhhhi/rmcs-develop:latest
      options: --user 0
    steps:
      - name: Checkout rmcs-navigation
        uses: actions/checkout@v5

      # FIXME: 等主分支的 Dockerfile 添加上下列依赖后，删除该段
      - name: Download dependency
        shell: bash
        run: |
          apt-get update -y
          apt-get install -y lua5.4 liblua5.4-0 liblua5.4-dev ros-$ROS_DISTRO-nav2-msgs

      - name: Run Lua tests
        shell: bash
        run: |
          set -euo pipefail
          export PATH="/opt/cmake/bin:${PATH}"
          cmake -S test -B build/test
          ctest --test-dir build/test --output-on-failure

      - name: Clone RMCS workspace
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${RMCS_REF}" "${RMCS_REPO}" /tmp/RMCS
          mkdir -p /tmp/RMCS/rmcs_ws/src/skills/rmcs-navigation
          tar -C "${GITHUB_WORKSPACE}" --exclude=".git" -cf - . \
            | tar -C /tmp/RMCS/rmcs_ws/src/skills/rmcs-navigation -xf -

      - name: Build rmcs-navigation with colcon
        shell: bash
        working-directory: /tmp/RMCS/rmcs_ws
        run: |
          set -euo pipefail
          set +u
          source /opt/ros/jazzy/setup.bash
          set -u
          export PATH="/opt/cmake/bin:${PATH}"
          colcon build --packages-up-to rmcs-navigation
