# 导航行为调度
bt_navigator:
  ros__parameters:
    global_frame: world
    robot_base_frame: base_link
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

# 全局地图 + 全局规划
planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_theta_star_planner::ThetaStarPlanner"
      allow_unknown: true # 允许在未知空间中进行搜索与通行
      tolerance: 0.1 # 若无法找到精确终点，可接受的终点偏差（米）
      how_many_corners: 8 # 邻域连接数（8 为八连通）
      w_euc_cost: 1.0 # 欧氏距离代价权重
      w_traversal_cost: 4.0 # 代价地图穿越代价权重
      use_final_approach_orientation: false # 终点不强制对齐朝向

global_costmap:
  global_costmap:
    ros__parameters:
      initial_transform_timeout: 120.0
      global_frame: world
      robot_base_frame: base_link
      footprint: "[[0.2475, 0.2475], [0.2475, -0.2475], [-0.2475, -0.2475], [-0.2475, 0.2475]]"
      update_frequency: 5.0
      publish_frequency: 5.0
      always_send_full_costmap: true
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/map"
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.3
        cost_scaling_factor: 0.5

# 局部地图 + 局部规划
controller_server:
  ros__parameters:
    global_frame: world
    controller_frequency: 20.0

    # 进度检查，超时没有移动会导向导航事件失败
    progress_checker_plugin: "progress_checker"
    current_progress_checker: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08
      movement_time_allowance: 4.0

    # 目标检查，一般不检查旋转角
    goal_checker_plugins: ["general_goal_checker"]
    current_goal_checker: "general_goal_checker"
    general_goal_checker:
      plugin: "nav2_controller::PositionGoalChecker"
      xy_goal_tolerance: 0.2

    # 布局规划核心
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      motion_model: "Omni"
      time_steps: 50
      model_dt: 0.05
      batch_size: 1400
      iteration_count: 1
      prune_distance: 6.0
      transform_tolerance: 0.1
      regenerate_noises: true
      retry_attempt_limit: 6
      visualize: true

      # 速度与加速度限制
      vx_max: +2.2
      vx_min: -2.0
      vy_max: +2.2
      vy_min: -2.0
      wz_max: +0.001
      ax_max: +20.0
      ax_min: -20.0
      ay_max: +20.0
      ay_min: -20.0
      az_max: +0.001

      # 采样噪声，鼓励左右探索
      vx_std: 0.55
      vy_std: 0.55
      wz_std: 0.001
      temperature: 0.34
      gamma: 0.015

      critics:
        [
          "VelocityDeadbandCritic",
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "PathAlignCritic",
          "PathFollowCritic",
        ]
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        deadband_velocities: [0.2, 0.2, 0.0]
      ConstraintCritic:
        enabled: true
        cost_weight: 5.0
      CostCritic:
        enabled: true
        cost_weight: 10.0
        critical_cost: 120.0
        collision_cost: 8000000.0
        near_collision_cost: 230
        cost_power: 2
        consider_footprint: true
        near_goal_distance: 1.0
        trajectory_point_step: 1
      GoalCritic:
        enabled: true
        cost_weight: 10.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_weight: 0.8
        threshold_to_consider: 1.0
        trajectory_point_step: 3
      PathFollowCritic:
        enabled: true
        cost_weight: 3.2
        threshold_to_consider: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      initial_transform_timeout: 120.0
      global_frame: base_link
      robot_base_frame: base_link
      footprint: "[[0.2475, 0.2475], [0.2475, -0.2475], [-0.2475, -0.2475], [-0.2475, 0.2475]]"
      update_frequency: 10.0
      publish_frequency: 10.0
      always_send_full_costmap: true
      rolling_window: true
      width: 16
      height: 16
      resolution: 0.04
      transform_tolerance: 0.1
      track_unknown_space: false
      plugins: [static_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_topic: /local_map
        map_subscribe_transient_local: false
        subscribe_to_updates: true
        use_maximum: true
        track_unknown_space: false
        lethal_cost_threshold: 90

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.37
        cost_scaling_factor: 0.5
